<!DOCTYPE html>
<html>
<head>
    <title>Applications Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f4f7fb;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .dashboard {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 13px;
            color: #888;
            padding: 12px;
        }

        td {
            padding: 14px 12px;
            font-size: 14px;
            border-top: 1px solid #eee;
        }

        tr:hover {
            background: #f9fbff;
        }

        button {
            background: #ff4d4f;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #e63946;
        }

        .badge {
            background: #e8f5ef;
            color: #1a6b4a;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
        }

        .loading {
            margin: 20px 0;
            color: #666;
        }
    </style>
</head>

<body>

<h1>📄 Applications Dashboard</h1>

<div id="loading" class="loading">Loading data...</div>

<div class="dashboard">
    <table id="table">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Position</th>
            <th>Experience</th>
            <th>Qualification</th> <!-- NEW -->
            <th>Message</th> <!-- NEW -->
            <th>Action</th>
        </tr>
    </table>
</div>

<script>

const API_URL = "https://clinic-backend-wg1k.onrender.com";
const ADMIN_KEY = "admin123"; // must match backend

// 🔐 Password
const password = prompt("Enter Admin Password:");
if(password !== "admin123"){
    alert("Access Denied");
    window.location.href = "index.html";
} else {
    loadApplications();
}

// 📥 Load Data
function loadApplications() {
    fetch(`${API_URL}/applications`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("loading").style.display = "none";

        let table = document.getElementById("table");

        table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Position</th>
            <th>Experience</th>
            <th>Qualification</th>
            <th>Message</th>
            <th>Action</th>
        </tr>`;

        data.forEach(row => {
            let tr = document.createElement("tr");

            tr.innerHTML = `
                <td><strong>#${row.id}</strong></td>
                <td>${row.name}</td>
                <td>${row.email}</td>
                <td>${row.phone}</td>
                <td>${row.position}</td>
                <td>${row.experience || "-"}</td>
                <td>${row.qualification || "-"}</td>
                <td>${row.message || "-"}</td>
                <td><button onclick="deleteRow(${row.id})">Delete</button></td>
            `;

            table.appendChild(tr);
        });

        if(data.length === 0){
            document.getElementById("loading").innerText = "No applications found.";
        }
    })
    .catch(err => {
        console.error(err);
        document.getElementById("loading").innerText = "Error loading data ❌";
    });
}

// ❌ Delete (UPDATED 🔥)
function deleteRow(id) {
    if(!confirm("Delete this application?")) return;

    fetch(`${API_URL}/delete_application/${id}`, {
        method: "DELETE",
        headers: {
            "x-admin-key": ADMIN_KEY
        }
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadApplications();
    })
    .catch(err => {
        alert("Error deleting ❌");
    });
}

</script>

</body>
</html>
