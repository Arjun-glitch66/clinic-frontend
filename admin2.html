<!DOCTYPE html>
<html>
<head>
    <title>Applications Dashboard</title>
    <style>
    body {
        font-family: Arial;
        background: #f5f7fa;
        padding: 20px;
    }
    h1 {
        color: #2c3e50;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }
    th, td {
        padding: 10px;
        border: 1px solid #ddd;
        text-align: center;
    }
    th {
        background: #3498db;
        color: white;
    }
    button {
        background: red;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
    }
    .loading {
        margin-top: 20px;
        font-size: 16px;
        color: #555;
    }
</style>
</head>
<body>

<h1>📄 Applications Dashboard</h1>

<div id="loading" class="loading">Loading data...</div>

<table id="table">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Position</th>
    <th>Experience</th>
    <th>Action</th>
</tr>
</table>

<script>

// 🔥 YOUR LIVE BACKEND
const API_URL = "https://clinic-backend-wg1k.onrender.com";

// 🔐 PASSWORD PROTECTION
const password = prompt("Enter Admin Password:");
if(password !== "admin123"){
    alert("Access Denied");
    window.location.href = "index.html";
} else {
    loadApplications();
}

// 📥 LOAD DATA
function loadApplications() {
    fetch(`${API_URL}/applications`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("loading").style.display = "none";

        let table = document.getElementById("table");

        // clear table before adding
        table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Position</th>
            <th>Experience</th>
            <th>Action</th>
        </tr>`;

        data.forEach(row => {
            let tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${row.id}</td>
                <td>${row.name}</td>
                <td>${row.email}</td>
                <td>${row.phone}</td>
                <td>${row.position}</td>
                <td>${row.experience}</td>
                <td><button onclick="deleteRow(${row.id})">❌</button></td>
            `;

            table.appendChild(tr);
        });

        if(data.length === 0){
            document.getElementById("loading").innerText = "No applications found.";
        }
    })
    .catch(err => {
        console.error(err);
        document.getElementById("loading").innerText = "Error loading data ❌";
    });
}

// ❌ DELETE FUNCTION
function deleteRow(id) {
    if(!confirm("Are you sure you want to delete this application?")) return;

    fetch(`${API_URL}/delete_application/${id}`, {
        method: "DELETE"
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadApplications(); // reload without refresh
    })
    .catch(err => {
        alert("Error deleting ❌");
    });
}

</script>

</body>
</html>
